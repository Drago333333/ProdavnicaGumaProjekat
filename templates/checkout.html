<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasa - Servis&Gume</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/checkout.css') }}">
</head>
<body class="kasa-pozadina">

    <nav class="glavna-navigacija">
        <div class="logo">
            <h2><a href="/">🛞 Servis&Gume</a></h2>
        </div>
        <ul class="meni">
            <li><a href="/korpa">⬅ NAZAD U KORPU</a></li>
        </ul>
    </nav>

    <div class="zakazivanje-kontejner">
        <h2 class="checkout-naslov">Detalji isporuke</h2>
        <p class="ukupno-naplata">Ukupno za naplatu: <strong>{{ "{:,}".format(ukupno) }} RSD</strong></p>

        <form action="/kupi" method="POST" class="zakazivanje-forma">
            <div class="forma-grupa">
                <label for="ime_prezime">Ime i prezime:</label>
                <input type="text" id="ime_prezime" name="ime_prezime" required placeholder="Petar Petrović">
            </div>
            
            <div class="forma-grupa">
                <label for="adresa">Adresa za dostavu:</label>
                <input type="text" id="adresa" name="adresa" required placeholder="Ulica i broj, Grad, Poštanski broj">
            </div>
            
            <div class="forma-grupa">
                <label for="telefon">Telefon:</label>
                <input type="text" id="telefon" name="telefon" required placeholder="06X/XXXXXXX">
            </div>
            
            <input type="hidden" name="ukupna_cena" value="{{ ukupno }}">

            <button type="submit" class="dugme-potvrda">Potvrdi i Naruči</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/checkout.js') }}"></script>

</body>
</html>
